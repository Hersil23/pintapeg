<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dashboard - PintaPeg Admin</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="logo">
        <h2>PintaPeg</h2>
        <span>Panel Admin</span>
      </div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="active"><span class="icon">&#9632;</span> Dashboard</a>
        <a href="/admin/categorias.html"><span class="icon">&#9776;</span> Categorias</a>
        <a href="/admin/productos.html"><span class="icon">&#9733;</span> Productos</a>
        <a href="/admin/ventas.html"><span class="icon">&#36;</span> Ventas</a>
        <a href="/admin/config.html"><span class="icon">&#9881;</span> Configuracion</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <header class="admin-header">
        <div style="display:flex;align-items:center;gap:1rem">
          <button class="btn btn-secondary btn-sm" onclick="toggleSidebar()" style="display:none" id="btn-menu">&#9776;</button>
          <h1>Dashboard</h1>
        </div>
        <div class="user-info">
          <span id="user-name"></span>
          <button class="btn-logout" onclick="handleLogout()">Cerrar sesion</button>
        </div>
      </header>

      <div class="admin-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="stat-ventas-hoy">0</div>
            <div class="stat-label">Ventas hoy</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-monto-hoy">$0.00</div>
            <div class="stat-label">Monto hoy</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-ventas-mes">0</div>
            <div class="stat-label">Ventas del mes</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-monto-mes">$0.00</div>
            <div class="stat-label">Monto del mes</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-ventas-total">0</div>
            <div class="stat-label">Ventas totales</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-monto-total">$0.00</div>
            <div class="stat-label">Monto total</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-tasa" style="font-size:1.2rem">-</div>
            <div class="stat-label">Tasa actual</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/js/admin.js"></script>
</body>
</html>
